# infra/docker/docker-compose.dev.yml
#
# Local development stack.
# Starts all infrastructure dependencies.
# Python services and Next.js UI run locally (hot-reload) — not in Docker.
#
# Usage:
#   docker compose -f infra/docker/docker-compose.dev.yml up -d
#   docker compose -f infra/docker/docker-compose.dev.yml down -v  # destroy volumes

version: "3.9"

services:

  # ── PostgreSQL 16 + pgvector ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: books-ai-postgres
    environment:
      POSTGRES_USER: books_ai
      POSTGRES_PASSWORD: dev_password_change_in_prod
      POSTGRES_DB: books_ai_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U books_ai -d books_ai_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (cache + sessions) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: books-ai-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Kafka + Zookeeper (event bus) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: books-ai-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zookeeper_data:/var/lib/zookeeper

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: books-ai-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Jaeger (distributed tracing UI) ─────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: books-ai-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ── Adminer (DB admin UI) ────────────────────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: books-ai-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  zookeeper_data:
